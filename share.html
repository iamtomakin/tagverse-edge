<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tagverse Edge — Snapshot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #1a1a1a;
      --surface: #2c2c2c;
      --text: #ffffff;
      --muted: #aaaaaa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .snapshot {
      background: var(--surface);
      border-radius: 8px;
      padding: 1.5rem;
      max-width: 360px;
      width: 100%;
    }
    .snapshot h1 {
      font-family: "Roboto Condensed", sans-serif;
      font-size: 1.25rem;
      margin: 0 0 1rem;
    }
    .snapshot dl {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem 1.5rem;
      margin: 0;
    }
    .snapshot dt { color: var(--muted); font-weight: 400; }
    .snapshot dd { margin: 0; font-weight: 600; }
    .snapshot .badge {
      display: inline-block;
      background: #444;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.85rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="snapshot" id="snapshot">
    <p id="noToken">Loading…</p>
    <div id="content" hidden>
      <h1>Tagverse Edge — Performance snapshot</h1>
      <dl>
        <dt>Period</dt>
        <dd id="period">—</dd>
        <dt>Total R</dt>
        <dd id="totalR">—</dd>
        <dt>Days logged</dt>
        <dd id="daysLogged">—</dd>
        <dt>Green days</dt>
        <dd id="greenDays">—</dd>
        <dt>Streak</dt>
        <dd id="streak">—</dd>
        <dt>Discipline score</dt>
        <dd id="score">—</dd>
      </dl>
      <span class="badge">Read-only · No login required</span>
    </div>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('t');
      const noTokenEl = document.getElementById('noToken');
      const contentEl = document.getElementById('content');
      if (!token) {
        noTokenEl.textContent = 'No snapshot link provided.';
        return;
      }
      try {
        const json = decodeURIComponent(escape(atob(token)));
        const payload = JSON.parse(json);
        noTokenEl.hidden = true;
        contentEl.hidden = false;
        document.getElementById('period').textContent = payload.period === '30' ? 'Last 30 days' : 'This month';
        document.getElementById('totalR').textContent = formatR(payload.totalR);
        document.getElementById('daysLogged').textContent = payload.daysLogged != null ? payload.daysLogged : '—';
        document.getElementById('greenDays').textContent = payload.greenDays != null ? payload.greenDays : '—';
        document.getElementById('streak').textContent = payload.streak != null ? payload.streak : '—';
        document.getElementById('score').textContent = payload.score != null ? payload.score : '—';
      } catch (e) {
        noTokenEl.textContent = 'Invalid or expired snapshot link.';
      }
      function formatR(r) {
        if (r === 0) return '-';
        if (r < 0) return r + 'R';
        return r === 1 ? '1R' : '+' + r + 'R';
      }
    })();
  </script>
</body>
</html>
